# saas-watcher.example.yaml
identity_source:
  provider: google-directory
  domain: mycompany.com
  credentials_file: ./credentials.json

providers:
  linear:
    api_key: "${LINEAR_API_KEY}"
  figma:
    api_key: "${FIGMA_SCIM_TOKEN}"
    extra:
      tenant_id: "${FIGMA_TENANT_ID}"
  hubspot:
    api_key: "${HUBSPOT_ACCESS_TOKEN}"
  miro:
    api_key: "${MIRO_ACCESS_TOKEN}"
    extra:
      org_id: "${MIRO_ORG_ID}"
  framer: {}
  slack:
    api_key: "${SLACK_SCIM_TOKEN}"
  anthropic:
    api_key: "${ANTHROPIC_ADMIN_KEY}"
  claude-code:
    api_key: "${ANTHROPIC_ADMIN_KEY}"

mappings:
  - group: design-team@mycompany.com
    providers:
      - name: figma
        role: editor
      - name: miro
        role: member
      - name: framer
        role: editor

  - group: engineering@mycompany.com
    providers:
      - name: linear
        role: member
      - name: figma
        role: viewer
      - name: claude-code
        role: claude_code_user
      - name: slack
        role: member

  - group: all-staff@mycompany.com
    providers:
      - name: anthropic
        role: user
      - name: slack
        role: member

  - group: sales@mycompany.com
    providers:
      - name: hubspot
        role: sales-rep

policies:
  grace_period: 72h
  dry_run: true
  notify_on_remove: true
  notify_channels:
    - slack:#it-ops
    - email:admin@mycompany.com
  exceptions:
    - email: cto@mycompany.com
      providers: ["*"]
